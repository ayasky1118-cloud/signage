services:
  db:
    image: mysql:8.0
    container_name: signage-db
    restart: always
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_DATABASE: signage_dev
      MYSQL_ROOT_PASSWORD: password
    ports:
      - "3307:3306"
    volumes:
      - ./mysql_data:/var/lib/mysql

  # バックエンド（Dockerfile 動作確認用。db と同一ネットワークで db:3306 に接続）
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: mysql+pymysql://root:password@db:3306/signage_dev?charset=utf8mb4
    depends_on:
      - db
